schemaVersion: 1
id: supplyscan.agent-status.windows
name: SupplyScan Agent status-only Windows smoke
os:
  family: windows
  version: "11"
provider:
  type: proxmox
  template: windows11-template-qga-9101
  templateVmId: 9101
  vmIdRange:
    start: 9102
    end: 9199
isolation:
  mode: ephemeralClone
guest:
  mode: auto
  windowsOrder:
    - qemuAgent
    - winrm
artifact:
  type: folder
  pathParam: artifactPath
  destination: "C:\\Oslab\\supplyscan-agent"
  transfer: archive
  exclude:
    - "logs/**"
    - "*.pdb"
    - "*.xml"
  command:
    shell: powershell
    template: |
      $ErrorActionPreference = "Stop"
      $statusJson = & "{ArtifactDir}\SupplyScanAgent.exe" cli_mode status --json
      $exitCode = $LASTEXITCODE
      if ($null -eq $exitCode) {
        $exitCode = 0
      }
      $statusText = [string]::Join([Environment]::NewLine, @($statusJson))
      [System.IO.File]::WriteAllText("C:\Oslab\supplyscan-agent-status.json", $statusText, [System.Text.Encoding]::UTF8)

      if ($exitCode -ne 0) {
        Write-Output $statusJson
        exit $exitCode
      }

      $outputJson = @'
      {
        "schemaVersion": 1,
        "kind": "inventory",
        "records": [
          {
            "name": "SupplyScanAgent CLI",
            "version": "status-ok",
            "publisher": "SupplyScan",
            "sources": ["CLI"],
            "confidence": "high",
            "evidence": [
              {
                "type": "cli",
                "source": "CLI",
                "path": "C:\\Oslab\\supplyscan-agent\\SupplyScanAgent.exe"
              }
            ],
            "metadata": {
              "statusPath": "C:\\Oslab\\supplyscan-agent-status.json"
            }
          }
        ]
      }
      '@
      [System.IO.File]::WriteAllText("{OutputPath}", $outputJson, [System.Text.Encoding]::UTF8)
      Write-Output $statusJson
outputs:
  actual:
    path: "C:\\Oslab\\scan-result.json"
    adapter: canonical.inventory
assertions:
  - type: inventory.contains
    id: supplyscan-agent-cli-status
    match:
      name: SupplyScanAgent CLI
    requiredSources:
      - CLI
reports:
  formats:
    - json
cleanup:
  destroyVm: true
  keepVmOnFailure: false
