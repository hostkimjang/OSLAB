schemaVersion: 1
id: supplyscan.gold-lite.windows
name: SupplyScan gold-lite Windows smoke
os:
  family: windows
  version: "11"
provider:
  type: proxmox
  template: windows11-template-qga-9101
  templateVmId: 9101
  vmIdRange:
    start: 9102
    end: 9199
isolation:
  mode: ephemeralClone
guest:
  mode: auto
  windowsOrder:
    - qemuAgent
    - winrm
artifact:
  type: folder
  pathParam: artifactPath
  destination: "C:\\Oslab\\artifact"
  command:
    shell: powershell
    template: '& "{ArtifactDir}\SupplyScan.exe" --output "{OutputPath}"'
fixtures:
  - id: gold-lite
    type: powershell
    source: validation/fixtures/windows/gold-lite.ps1
    expectedOutput: "C:\\Oslab\\expected_inventory.json"
outputs:
  actual:
    path: "C:\\Oslab\\scan-result.json"
    adapter: supplyscan.inventory
assertions:
  - type: inventory.contains
    id: known-registry-git
    match:
      nameContains: Git
    requiredSources:
      - Registry
  - type: inventory.evidencePresent
    id: known-registry-git-evidence
plugins:
  - name: supplyscan
reports:
  formats:
    - junit
    - json
    - html
cleanup:
  destroyVm: true
  keepVmOnFailure: false
